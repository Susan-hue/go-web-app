apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.metadata.name }}-route
  namespace: default
spec:
  parentRefs:
    - name: {{ .Values.metadata.name }}-gateway
  hostnames:
    - "{{ .Values.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.metadata.name }}
          port: 80