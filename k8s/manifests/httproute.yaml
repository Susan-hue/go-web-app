apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: go-web-app-route
  namespace: default
spec:
  parentRefs:
    - name: go-web-app-gateway
  hostnames:
    - "go-web-app.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: go-web-app
          port: 80