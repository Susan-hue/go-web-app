name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed for the Helm commit

jobs:
  push-and-update:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}   # PAT with repo write access
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:${{ github.event.workflow_run.id }}
            ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update tag in Helm chart
        run: |
          sed -i 's/tag: .*/tag: "${{ github.event.workflow_run.id }}"/' helm/go-web-app-chart/values.yaml

      - name: Commit and push Helm changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add helm/go-web-app-chart/values.yaml
          git diff --staged --quiet || git commit -m "chore: update image tag to ${{ github.event.workflow_run.id }}"
          git push